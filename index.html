<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STG7 Bet Tracker</title>
<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
}
input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}
button{
background:#00c853;
color:white;
font-weight:bold;
}
.card{
background:#222;
padding:10px;
margin-top:10px;
border-radius:10px;
}
.win{color:#00e676;}
.lose{color:#ff5252;}
</style>
</head>
<body>

<div class="container">
<h1>⚽ STG7 Bet Tracker</h1>

<input id="home" placeholder="Home Team">
<input id="away" placeholder="Away Team">

<select id="betType">
<option>1X2</option>
<option>Over/Under</option>
</select>

<input id="selection" placeholder="Selection">
<input id="odds" type="number" step="0.01" placeholder="Odds">
<input id="stake" type="number" placeholder="Stake">

<select id="result">
<option value="win">Win</option>
<option value="lose">Lose</option>
</select>

<button onclick="saveBet()">Save Bet</button>

<h2>History</h2>
<div id="history"></div>

</div>

<script>
let bets = JSON.parse(localStorage.getItem("bets")) || [];

function saveBet(){
let home=document.getElementById("home").value;
let away=document.getElementById("away").value;
let odds=parseFloat(document.getElementById("odds").value);
let stake=parseFloat(document.getElementById("stake").value);
let result=document.getElementById("result").value;

let profit=result==="win"
? (stake*odds)-stake
: -stake;

bets.push({
home,away,odds,stake,result,profit
});

localStorage.setItem("bets",JSON.stringify(bets));
render();
}

function render(){
let html="";
bets.reverse().forEach(b=>{
html+=`
<div class="card">
<b>${b.home} vs ${b.away}</b><br>
Odds: ${b.odds}<br>
Stake: ${b.stake}<br>
<span class="${b.result}">
${b.result.toUpperCase()}
</span><br>
Profit: ${b.profit}
</div>
`;
});
document.getElementById("history").innerHTML=html;
}
render();
</script>

</body>
</html>
