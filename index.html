<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Match Board</title>
<style>
body{margin:0;background:#000;font-family:Arial,sans-serif;color:white}
.header{background:#0037ff;text-align:center;padding:25px 10px;font-size:42px;font-weight:bold}
.date{background:#0055cc;text-align:center;padding:12px;font-size:28px;font-weight:bold}
table{width:100%;border-collapse:collapse;background:white;color:black}
th,td{border:1px solid #aaa;text-align:center;padding:14px 8px;font-size:18px}
th{background:#ddd;font-weight:bold}
.red{color:red;font-weight:bold}
.team{font-weight:bold}
.footer{background:#0037ff;text-align:center;padding:22px 10px;font-size:22px;line-height:1.8}
.yellow{color:yellow;font-weight:bold}
</style>
</head>

<body>

<div class="header">STG7 BET TRACKER</div>
<div class="date" id="dateBox">Loading...</div>

<table>
<thead>
<tr>
<th>KR</th>
<th>BODY</th>
<th>အသင်း ၁</th>
<th>Results</th>
<th>အသင်း ၂</th>
<th>GOAL+</th>
</tr>
</thead>
<tbody id="matchTable"></tbody>
</table>

<div class="footer">
ကြေးအပြောင်းလဲ ရှိနိုင်ပါသည်။<br>
<span class="yellow">Monday to Friday (2:00) CLOSE 🚫</span><br>
<span class="yellow">Saturday, Sunday (3:00) CLOSE 🚫</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0rUsY7AVAYYhhUzze0_UUuUJBSMVc4dQ",
  authDomain: "stg7-bet-tracker.firebaseapp.com",
  projectId: "stg7-bet-tracker",
  storageBucket: "stg7-bet-tracker.firebasestorage.app",
  messagingSenderId: "696998959643",
  appId: "1:696998959643:web:2ba9bccb6beabfb681b6be",
  measurementId: "G-C8ZYMLW4FD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db,"matches"), (snap) => {
  let html = "";
  let currentDate = "";

  snap.forEach((doc) => {
    const m = doc.data();
    if (m.date) currentDate = m.date;

    html += `
      <tr>
        <td><b>${m.kr || ""}</b></td>
        <td class="red">${m.body || ""}</td>
        <td class="team">${m.home || ""}</td>
        <td>${m.result || ""}</td>
        <td class="team">${m.away || ""}</td>
        <td class="red">${m.goal || ""}</td>
      </tr>
    `;
  });

  document.getElementById("matchTable").innerHTML = html;
  document.getElementById("dateBox").innerText = currentDate || "STG7 Match Board";
});
</script>

</body>
</html>
