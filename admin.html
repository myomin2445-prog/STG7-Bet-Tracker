
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Admin</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:15px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:green;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

.card{
background:#111;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.del{
background:red;
margin-top:10px;
}
</style>
</head>

<body>

<h1>STG7 Admin</h1>

<input id="date" placeholder="Date">
<input id="kr" placeholder="KR">
<input id="body" placeholder="BODY">
<input id="home" placeholder="အသင်း ၁">
<input id="away" placeholder="အသင်း ၂">
<input id="result" placeholder="RESULT">
<input id="goal" placeholder="GOAL+">

<button onclick="addMatch()">SAVE</button>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB0rUsY7AVAYYhhUzze0_UUuUJBSMVc4dQ",
authDomain: "stg7-bet-tracker.firebaseapp.com",
projectId: "stg7-bet-tracker",
storageBucket: "stg7-bet-tracker.firebasestorage.app",
messagingSenderId: "696998959643",
appId: "1:696998959643:web:2ba9bccb6beabfb681b6be"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addMatch = async function(){

await addDoc(collection(db,"matches"),{
date: date.value,
kr: kr.value,
body: body.value,
home: home.value,
away: away.value,
result: result.value,
goal: goal.value
});

date.value="";
kr.value="";
body.value="";
home.value="";
away.value="";
result.value="";
goal.value="";
};

onSnapshot(collection(db,"matches"),(snap)=>{

let html="";

snap.forEach(d=>{

const m=d.data();

html += `
<div class="card">
<b>${m.kr||""}</b><br>
${m.home||""} vs ${m.away||""}<br>
Result : ${m.result||"-"}<br>
Goal+ : ${m.goal||""}<br>

<button class="del"
onclick="deleteMatch('${d.id}')">
DELETE
</button>

</div>
`;

});

list.innerHTML=html;

});

window.deleteMatch = async function(id){

await deleteDoc(doc(db,"matches",id));

};

</script>

</body>
</html>
