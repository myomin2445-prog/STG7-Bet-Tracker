<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STG7 Admin</title>
<style>
body{font-family:Arial;background:#111;color:white;padding:15px}
h1{text-align:center;color:#fff}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:0;font-size:16px}
button{background:#008000;color:white;font-weight:bold}
.card{background:#222;padding:12px;margin:10px 0;border-radius:10px}
.del{background:#c40000}
</style>
</head>
<body>

<h1>STG7 Admin Panel</h1>

<input id="date" placeholder="နေ့စွဲ 23/6/2026 (အင်္ဂါနေ့)">
<input id="time" placeholder="KR အချိန် 2:00">
<input id="match" placeholder="BODY 2-50">
<input id="over" placeholder="အသင်း ၁">
<input id="under" placeholder="အသင်း ၂">
<input id="result" placeholder="Result">
<input id="goal" placeholder="GOAL+ 3-30">

<button onclick="addMatch()">ပွဲထည့်ရန်</button>

<h2>ပွဲစာရင်း</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0rUsY7AVAYYhhUzze0_UUuUJBSMVc4dQ",
  authDomain: "stg7-bet-tracker.firebaseapp.com",
  projectId: "stg7-bet-tracker",
  storageBucket: "stg7-bet-tracker.firebasestorage.app",
  messagingSenderId: "696998959643",
  appId: "1:696998959643:web:2ba9bccb6beabfb681b6be",
  measurementId: "G-C8ZYMLW4FD"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addMatch = async function(){
  await addDoc(collection(db,"matches"),{
    date: date.value,
    time: time.value,
    match: match.value,
    over: over.value,
    under: under.value,
    result: result.value,
    goal: goal.value,
    createdAt: Date.now()
  });

  time.value="";
  match.value="";
  over.value="";
  under.value="";
  result.value="";
  goal.value="";
};

onSnapshot(collection(db,"matches"),(snap)=>{
  let html="";
  snap.forEach(d=>{
    const m=d.data();
    html += `
    <div class="card">
      <b>${m.time}</b> | BODY: ${m.match}<br>
      ${m.over} vs ${m.under}<br>
      Result: ${m.result || "-"}<br>
      GOAL+: ${m.goal}<br>
      <button class="del" onclick="deleteMatch('${d.id}')">ဖျက်ရန်</button>
    </div>`;
  });
  list.innerHTML=html;
});

window.deleteMatch = async function(id){
  await deleteDoc(doc(db,"matches",id));
};
</script>

</body>
</html>
